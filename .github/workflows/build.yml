name: Build LibMan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:

  # ============================================================
  # Linux build
  # ============================================================

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Checkout CORE (CommonDB)
        uses: actions/checkout@v4
        with:
          repository: IHP-GmbH/CommonDB
          path: .deps/CommonDB
          token: ${{ secrets.LIBMAN_CORE_GIT_TOKEN || github.token }}

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libgl1-mesa-dev \
            autoconf \
            automake \
            libtool \
            pkg-config

      - name: Configure (qmake)
        run: |
          mkdir -p build
          cd build
          qmake ../libman.pro

      - name: Build
        env:
          CAPNP_SKIP_CHECK: 1
        run: |
          cd build
          make -j1 capnp_install
          make -j1 lstream_schemas
          make -j1 core_fetch
          make -j"$(nproc)"

      - name: Package Linux bundle (tar.gz)
        run: |
          set -e
          rm -rf dist
          mkdir -p dist

          BIN=""
          for p in build/libman build/LibMan build/release/libman build/release/LibMan; do
            if [ -f "$p" ]; then BIN="$p"; break; fi
          done

          if [ -z "$BIN" ]; then
            echo "LibMan binary not found."
            ls -la build
            exit 1
          fi

          cp "$BIN" dist/libman

          [ -d scripts ]  && cp -R scripts  dist/ || true
          [ -d keywords ] && cp -R keywords dist/ || true
          [ -d icons ]    && cp -R icons    dist/ || true

          tar -czf libman-linux.tar.gz dist

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: libman-linux
          path: libman-linux.tar.gz
          if-no-files-found: error


  # ============================================================
  # RHEL 8 compatible build (Rocky Linux 8 container, glibc 2.28)
  # ============================================================

  build-rhel8:
    name: Build RHEL 8 bundle
    runs-on: ubuntu-latest
    container:
      image: rockylinux:8

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Checkout CORE (CommonDB)
        uses: actions/checkout@v4
        with:
          repository: IHP-GmbH/CommonDB
          path: .deps/CommonDB
          token: ${{ secrets.LIBMAN_CORE_GIT_TOKEN || github.token }}

      - name: Install build dependencies
        run: bash scripts/ci_deps_rhel8.sh

      - name: Install Qt
        run: bash scripts/ci_install_qt_rhel8.sh

      - name: Configure (qmake)
        run: |
          mkdir -p build
          cd build
          qmake CONFIG+=release ../libman.pro

      - name: Build
        env:
          CAPNP_SKIP_CHECK: 1
        run: |
          cd build
          make -j1 capnp_install
          make -j1 lstream_schemas
          make -j1 core_fetch
          make -j"$(nproc)"

      - name: Install linuxdeployqt
        run: bash scripts/ci_install_linuxdeployqt.sh

      - name: Package RHEL 8 bundle
        run: |
          chmod +x scripts/package_linux_bundle.sh
          bash scripts/package_linux_bundle.sh build libman-rhel8.tar.gz "RHEL 8.10 compatible"

      - name: Upload RHEL 8 artifact
        uses: actions/upload-artifact@v4
        with:
          name: libman-rhel8
          path: libman-rhel8.tar.gz
          if-no-files-found: error


  # ============================================================
  # Linux tests + Code Coverage
  # ============================================================

  tests-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Checkout CORE (CommonDB)
        uses: actions/checkout@v4
        with:
          repository: IHP-GmbH/CommonDB
          path: .deps/CommonDB
          token: ${{ secrets.LIBMAN_CORE_GIT_TOKEN || github.token }}

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            build-essential \
            cmake \
            libgl1-mesa-dev \
            autoconf \
            automake \
            libtool \
            pkg-config \
            python3 \
            python3-pip

          python3 -m pip install --upgrade pip
          python3 -m pip install gcovr

      - name: Configure tests (coverage enabled)
        run: |
          mkdir -p build-tests
          cd build-tests
          qmake CONFIG+=debug CONFIG+=coverage ../tests/tests.pro

      - name: Build tests
        env:
          CAPNP_SKIP_CHECK: 1
        run: |
          cd build-tests
          make -j1 capnp_install
          make -j1 lstream_schemas
          make -j1 core_fetch
          make -j"$(nproc)"

      - name: Export Cap'n Proto runtime path
        run: |
          echo "LD_LIBRARY_PATH=$GITHUB_WORKSPACE/capnp-install/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Make Linux test script executable
        run: |
          chmod +x scripts/run_tests.sh

      - name: Run tests and generate coverage
        env:
          QT_QPA_PLATFORM: offscreen
          LIBMAN_TEST_DATA_DIR: ${{ github.workspace }}/tests/data
        run: |
          xvfb-run -a ./scripts/run_tests.sh

      - name: Upload test log
        uses: actions/upload-artifact@v4
        with:
          name: libman-test-log-linux
          path: test_results.txt
          if-no-files-found: warn

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libman-coverage-html
          path: |
            coverage.html
            coverage.*.html
            coverage.css
            coverage.js
          if-no-files-found: warn


  # ============================================================
  # Windows build
  # ============================================================

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Checkout CORE (CommonDB)
        uses: actions/checkout@v4
        with:
          repository: IHP-GmbH/CommonDB
          path: .deps/CommonDB
          token: ${{ secrets.LIBMAN_CORE_GIT_TOKEN || github.token }}

      - name: Install Qt (Qt 5.15.2 MinGW 64-bit)
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw81'
          tools: 'tools_mingw81'

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes

      - name: Build Cap'n Proto
        shell: cmd
        env:
          CAPNP_SKIP_CHECK: 1
        run: |
          call scripts\mkcapnp.cmd
          if not exist capnp-install\include\capnp\message.h (
            echo ERROR: capnp headers missing after install
            exit /b 1
          )

      - name: Build CORE (CommonDB)
        shell: cmd
        run: call scripts\fetch_core.cmd

      - name: Configure (qmake)
        shell: bash
        run: |
          mkdir -p build
          cd build
          qmake CONFIG+=release ../libman.pro
          bash ../scripts/patch_capnp_makefile.sh

      - name: Build (mingw32-make)
        shell: bash
        env:
          CAPNP_SKIP_CHECK: 1
        run: |
          cd build
          mingw32-make -j"$(nproc)"

      - name: Deploy Qt runtime and resources
        shell: cmd
        run: |
          cd build

          rmdir /s /q dist 2>nul
          mkdir dist

          if exist release\libman.exe (
            copy release\libman.exe dist\libman.exe
          ) else if exist release\LibMan.exe (
            copy release\LibMan.exe dist\libman.exe
          ) else if exist libman.exe (
            copy libman.exe dist\libman.exe
          ) else if exist LibMan.exe (
            copy LibMan.exe dist\libman.exe
          ) else (
            echo libman.exe not found
            dir
            exit /b 1
          )

          windeployqt --dir dist dist\libman.exe

          if exist ..\icons xcopy /E /I /Y ..\icons dist\icons

      - name: Build Windows installer
        shell: pwsh
        run: |
          if (!(Test-Path "installer\LibMan.iss")) {
            Write-Error "Missing installer\LibMan.iss"
          }
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "installer\LibMan.iss" `
            /O"build\installer"

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: libman-windows-installer
          path: build/installer/*.exe
          if-no-files-found: error
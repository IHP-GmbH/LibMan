name: Build LibMan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ============================================================
  # Linux build
  # ============================================================

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgl1-mesa-dev

      - name: Configure (qmake)
        run: |
          mkdir -p build
          cd build
          qmake ../libman.pro

      - name: Build
        run: |
          cd build
          make -j"$(nproc)"

      - name: Package Linux bundle (tar.gz)
        run: |
          set -e
          rm -rf dist
          mkdir -p dist

          BIN=""
          for p in build/libman build/LibMan build/release/libman build/release/LibMan; do
            if [ -f "$p" ]; then BIN="$p"; break; fi
          done

          if [ -z "$BIN" ]; then
            echo "LibMan binary not found."
            ls -la build
            exit 1
          fi

          cp "$BIN" dist/libman

          [ -d scripts ]  && cp -R scripts  dist/ || true
          [ -d keywords ] && cp -R keywords dist/ || true
          [ -d icons ]    && cp -R icons    dist/ || true

          tar -czf libman-linux.tar.gz dist

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: libman-linux
          path: libman-linux.tar.gz
          if-no-files-found: error


  # ============================================================
  # Linux tests + Code Coverage
  # ============================================================

  tests-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb build-essential libgl1-mesa-dev
          python3 -m pip install --upgrade pip
          python3 -m pip install gcovr

      - name: Configure tests (coverage enabled)
        run: |
          mkdir -p build-tests
          cd build-tests
          qmake CONFIG+=debug CONFIG+=coverage ../tests/tests.pro

      - name: Build tests
        run: |
          cd build-tests
          make -j"$(nproc)"

      - name: Clean old coverage data
        run: |
          cd build-tests
          find . -name "*.gcda" -delete || true

      - name: Run tests (headless Qt)
        run: |
          cd build-tests
          xvfb-run -a ./tst_libman_gui -platform offscreen

      - name: Generate coverage report
        run: |
          cd build-tests
          gcovr \
            --root .. \
            --exclude '../tests' \
            --exclude '.*moc_.*' \
            --exclude '.*qrc_.*' \
            --print-summary \
            --txt

      - name: Upload coverage HTML
        run: |
          cd build-tests
          gcovr \
            --root .. \
            --exclude '../tests' \
            --html-details coverage.html

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: libman-coverage-html
          path: build-tests/coverage.html
          if-no-files-found: warn


  # ============================================================
  # Windows build
  # ============================================================

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Qt (Qt 5.15.2 MinGW 64-bit)
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw81'
          tools: 'tools_mingw81'

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes

      - name: Configure (qmake)
        shell: bash
        run: |
          mkdir -p build
          cd build
          qmake CONFIG+=release ../libman.pro

      - name: Build (mingw32-make)
        shell: bash
        run: |
          cd build
          mingw32-make -j"$(nproc)"

      - name: Deploy Qt runtime and runtime resources
        shell: cmd
        run: |
          cd build

          rmdir /s /q dist 2>nul
          mkdir dist

          if exist release\libman.exe (
            copy release\libman.exe dist\libman.exe
          ) else if exist release\LibMan.exe (
            copy release\LibMan.exe dist\libman.exe
          ) else if exist libman.exe (
            copy libman.exe dist\libman.exe
          ) else if exist LibMan.exe (
            copy LibMan.exe dist\libman.exe
          ) else (
            echo libman.exe not found
            dir
            exit /b 1
          )

          windeployqt --dir dist dist\libman.exe

          if exist ..\icons     xcopy /E /I /Y ..\icons     dist\icons

      - name: Build Windows installer (Inno Setup)
        shell: pwsh
        run: |
          if (!(Test-Path "installer\LibMan.iss")) {
            Write-Error "Missing installer\LibMan.iss"
          }
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "installer\LibMan.iss" `
            /O"build\installer"

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: libman-windows-installer
          path: build/installer/*.exe
          if-no-files-found: error